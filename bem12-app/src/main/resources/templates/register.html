<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Register – BEM12 App</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
  <div class="card">
    <a href="/" class="back-link">&#8592; Home</a>
    <h2>Create account</h2>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password <span class="hint-inline">(min. 6 characters)</span></label>
        <input type="password" name="password" placeholder="••••••••" minlength="6" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="hint">Already have an account? <a href="/login">Login</a></p>
  </div>
</body>
</html>
