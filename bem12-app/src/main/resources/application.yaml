app:
  version: ${APP_VERSION:1.0.0}
  name: BEM12 Application

dynamodb:
  region: ${DYNAMODB_REGION:us-east-1}
  table-name: ${DYNAMODB_TABLE_NAME:bem12-visits}

s3:
  region: ${S3_REGION:us-east-1}
  bucket-name: ${S3_PROFILE_BUCKET:bem12-profiles}

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.bem12.app: INFO

server:
  port: ${PORT:5000}
